name: Build

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build launcher
        shell: pwsh
        run: |
          dotnet publish launcher/Launcher.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o build/output

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SP-MembershipManager
          path: build/output/SP-MembershipManager.exe
          if-no-files-found: error

      - name: Attach exe to release
        if: github.event_name == 'release'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} build/output/SP-MembershipManager.exe
